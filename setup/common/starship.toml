"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$docker_context\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

# ── OS icon ────────────────────────────────────────────────────────────────────
[os]
disabled = false
style = "bold white"

[os.symbols]
Linux = " "
Macos = " "
Windows = " "
Ubuntu = " "
Debian = " "
Arch = " "

# ── User / Host (show only on SSH) ────────────────────────────────────────────
[username]
show_always = false
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)[@](dimmed white)"

[hostname]
ssh_only = true
style = "bold yellow"
format = "[$ssh_symbol$hostname]($style) "

# ── Directory ─────────────────────────────────────────────────────────────────
[directory]
style = "bold cyan"
truncation_length = 4
truncate_to_repo = true
format = "[ $path]($style)[$read_only]($read_only_style) "
read_only = " 󰌾"

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "󰞇 "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = " "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# ── Docker context ────────────────────────────────────────────────────────────
[docker_context]
symbol = " "
style = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = true

# ── Fill (pushes right-side modules to the right) ────────────────────────────
[fill]
symbol = " "

# ── Command duration ──────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2_000
style = "dimmed yellow"
format = "[$duration]($style) "

# ── Time ──────────────────────────────────────────────────────────────────────
[time]
disabled = false
style = "dimmed white"
format = "[$time]($style)"
time_format = "%H:%M"

# ── Prompt character ──────────────────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"
